bsp: phytium_pd2308_demo
build-type: bsp
cflags: []
copyrights:
- Copyright (C) 2025 Phytium Information Technology, Inc.
cppflags: []
enabled-by: true
family: phytium
includes:
  - bsps/../../../drivers/port
  - bsps/../../../standalone/common
  - bsps/../../../standalone/drivers/iomux/fiopad
  - bsps/../../../standalone/drivers/mmc/fsdif
  - bsps/../../../standalone/drivers/eth/fxmac

  - bsps/aarch64/phytium/include/soc/pd2308
  - bsps/../../../standalone/board/pd2308_demo

install:
- destination: ${BSP_INCLUDEDIR}/phytium
  source:
  # support source files using #include "fparameters.h"
  - bsps/aarch64/phytium/include/soc/pd2308/fparameters.h

# support source files using #inclde <soc/pd2308/fparameters.h>
- destination: ${BSP_INCLUDEDIR}/soc/pd2308
  source:
  - bsps/aarch64/phytium/include/soc/pd2308/fparameters.h

- destination: ${BSP_INCLUDEDIR}/phytium
  source:
  - bsps/../../../standalone/board/pd2308_demo/fio_mux.h
  - bsps/../../../standalone/board/pd2308_demo/fsdif_timing.h

